<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="storyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D2B4E"/>
      <stop offset="100%" stop-color="#0B6E6E"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#storyBg)"/>
  <!-- Decorative -->
  <circle cx="540" cy="400" r="300" fill="rgba(11,110,110,0.12)"/>
  <circle cx="200" cy="1400" r="250" fill="rgba(11,110,110,0.08)"/>
  <!-- Logo cross -->
  <g transform="translate(540, 480)" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round">
    <rect x="-50" y="-18" width="100" height="36" rx="8"/>
    <rect x="-18" y="-50" width="36" height="100" rx="8"/>
  </g>
  <!-- Brand name -->
  <text x="540" y="680" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="#FFFFFF" letter-spacing="4">CareFlow</text>
  <!-- Tagline -->
  <text x="540" y="740" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="26" fill="rgba(255,255,255,0.8)">AI-Powered Clinical Discharge Documentation</text>
  <!-- Key features -->
  <g transform="translate(540, 900)" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">
    <text x="0" y="0">━━━━ ◆ ━━━━</text>
    <text x="0" y="55" font-weight="600" fill="#FFFFFF">Clinical Summary + Patient-Friendly</text>
    <text x="0" y="90">Two outputs from one form</text>
    <text x="0" y="150" font-weight="600" fill="#FFFFFF">Translate into Hausa · Yoruba · Igbo</text>
    <text x="0" y="185">Patients understand their care in their language</text>
    <text x="0" y="245" font-weight="600" fill="#FFFFFF">100% NDPR Compliant</text>
    <text x="0" y="280">Built for Nigerian hospitals, by Nigerian standards</text>
    <text x="0" y="340">━━━━ ◆ ━━━━</text>
  </g>
  <!-- Button -->
  <rect x="340" y="1050" width="400" height="64" rx="32" fill="#FFFFFF"/>
  <text x="540" y="1090" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="22" fill="#0D2B4E">Start Free Pilot →</text>
  <!-- Footer -->
  <text x="540" y="1860" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(255,255,255,0.4)">careflow-kappa.vercel.app</text>
</svg>
