<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B4E"/>
      <stop offset="60%" stop-color="#094D4D"/>
      <stop offset="100%" stop-color="#0B6E6E"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0B6E6E"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bannerBg)"/>
  <!-- Decorative circles -->
  <circle cx="1200" cy="100" r="200" fill="rgba(11,110,110,0.15)"/>
  <circle cx="1300" cy="350" r="150" fill="rgba(11,110,110,0.1)"/>
  <circle cx="100" cy="400" r="100" fill="rgba(11,110,110,0.08)"/>
  <!-- Accent bar -->
  <rect x="80" y="140" width="60" height="6" rx="3" fill="url(#accentBar)"/>
  <!-- Logo mark: medical cross -->
  <g transform="translate(110, 200)" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round">
    <rect x="-22" y="-8" width="44" height="16" rx="3"/>
    <rect x="-8" y="-22" width="16" height="44" rx="3"/>
  </g>
  <!-- CareFlow name -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="52" fill="#FFFFFF" letter-spacing="3">CareFlow</text>
  <!-- Tagline -->
  <text x="80" y="305" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" fill="rgba(255,255,255,0.8)">AI-Powered Clinical Discharge Documentation</text>
  <!-- Feature bullets -->
  <g transform="translate(80, 350)" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.65)">
    <text x="0" y="0">•  Dual-Mode Output: Clinical Summary + Patient-Friendly</text>
    <text x="0" y="24">•  Translation: Hausa · Yoruba · Igbo</text>
    <text x="0" y="48">•  NDPR Compliant · Built for Nigerian Hospitals</text>
  </g>
  <!-- Right side mockup decoration -->
  <g transform="translate(900, 80)">
    <rect x="0" y="0" width="480" height="340" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Mockup header -->
    <rect x="30" y="30" width="200" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
    <rect x="30" y="50" width="140" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
    <!-- Mockup body lines -->
    <rect x="30" y="85" width="420" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="30" y="100" width="350" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="30" y="115" width="380" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="30" y="145" width="420" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="30" y="160" width="280" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="30" y="190" width="200" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="30" y="205" width="420" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="30" y="220" width="380" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <!-- Two-column layout hint -->
    <rect x="30" y="260" width="200" height="50" rx="6" fill="rgba(11,110,110,0.2)"/>
    <rect x="250" y="260" width="200" height="50" rx="6" fill="rgba(180,83,9,0.15)"/>
  </g>
</svg>
