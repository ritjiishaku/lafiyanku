<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2B4E"/>
      <stop offset="100%" stop-color="#0B6E6E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>
  <!-- Medical cross symbol -->
  <g transform="translate(200, 160)" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round">
    <rect x="-30" y="-10" width="60" height="20" rx="4"/>
    <rect x="-10" y="-30" width="20" height="60" rx="4"/>
  </g>
  <!-- CareFlow text -->
  <text x="200" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="36" fill="#FFFFFF" letter-spacing="2">CareFlow</text>
  <!-- Tagline -->
  <text x="200" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" fill="rgba(255,255,255,0.7)">Clinical Discharge Documentation</text>
</svg>
